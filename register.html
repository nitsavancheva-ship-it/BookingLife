<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookingLife — Register</title>
</head>
<body>
  <div id="navbar"></div>
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title mb-4 text-center"><i class="bi bi-person-plus"></i> Create account</h2>
            <form id="register-form" novalidate>
              <div class="mb-3">
                <label for="display-name" class="form-label">Display name</label>
                <input type="text" class="form-control" id="display-name" required />
                <div class="invalid-feedback">Please enter a display name.</div>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required />
                <div class="invalid-feedback">Please enter a valid email.</div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required minlength="6" />
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
              </div>
              <div class="mb-3">
                <label class="form-label d-block">I want to join as</label>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="role-user" value="user" checked required />
                  <label class="form-check-label" for="role-user">Guest &mdash; book stays</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="role" id="role-host" value="host" required />
                  <label class="form-check-label" for="role-host">Host &mdash; list your property</label>
                </div>
              </div>
              <div id="form-error" class="alert alert-danger d-none"></div>
              <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">Already have an account? <a href="/login.html">Log in</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/js/pages/register.js"></script>
</body>
</html>
