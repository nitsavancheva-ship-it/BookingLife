<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookingLife — Reset password</title>
</head>
<body>
  <div id="navbar"></div>
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title mb-4 text-center"><i class="bi bi-shield-lock"></i> Reset password</h2>
            <form id="reset-form" novalidate>
              <div class="mb-3">
                <label for="password" class="form-label">New password</label>
                <input type="password" class="form-control" id="password" required minlength="6" />
                <div class="invalid-feedback">Password must be at least 6 characters.</div>
              </div>
              <div id="form-error" class="alert alert-danger d-none"></div>
              <button type="submit" class="btn btn-primary w-100" disabled>Set new password</button>
            </form>
            <div id="invalid-link" class="alert alert-danger d-none mb-0">This reset link is invalid or has expired. <a href="/forgot-password.html" class="alert-link">Request a new one</a>.</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/js/pages/resetPassword.js"></script>
</body>
</html>
