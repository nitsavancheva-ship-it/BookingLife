<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookingLife — Forgot password</title>
</head>
<body>
  <div id="navbar"></div>
  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="card-title mb-4 text-center"><i class="bi bi-key"></i> Forgot password</h2>
            <form id="forgot-form" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required />
                <div class="invalid-feedback">Please enter a valid email.</div>
              </div>
              <div id="form-error" class="alert alert-danger d-none"></div>
              <button type="submit" class="btn btn-primary w-100">Send reset link</button>
            </form>
            <div id="form-success" class="alert alert-success d-none">If an account exists for that email, a password reset link is on its way.</div>
            <p class="text-center mt-3 mb-0">Remembered it? <a href="/login.html">Log in</a></p>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/js/pages/forgotPassword.js"></script>
</body>
</html>
